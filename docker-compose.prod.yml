services:
  postgres:
    image: postgres:16-alpine
    container_name: mud-postgres
    restart: always
    environment:
      POSTGRES_DB: muddb
      POSTGRES_USER: mud
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mudpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mud -d muddb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mud-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_REPO}/backend:latest
    container_name: mud-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/muddb
      SPRING_DATASOURCE_USERNAME: mud
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-mudpassword}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GITHUB_REPO}/frontend:latest
    container_name: mud-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: mud-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
