name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: muddb
          POSTGRES_USER: mud
          POSTGRES_PASSWORD: mudpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mud -d muddb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mud-backend/**/*.gradle*', 'mud-backend/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build & Test
        working-directory: mud-backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/muddb
          SPRING_DATASOURCE_USERNAME: mud
          SPRING_DATASOURCE_PASSWORD: mudpassword
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          CLAUDE_API_KEY: test-key
        run: ./gradlew build --no-daemon

      - name: Coverage Check
        working-directory: mud-backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/muddb
          SPRING_DATASOURCE_USERNAME: mud
          SPRING_DATASOURCE_PASSWORD: mudpassword
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          CLAUDE_API_KEY: test-key
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      - name: Print Coverage
        if: always()
        working-directory: mud-backend
        run: |
          XML="build/reports/jacoco/test/jacocoTestReport.xml"
          if [ -f "$XML" ]; then
            MISSED=$(grep -oP 'type="INSTRUCTION" missed="\K[0-9]+' "$XML" | tail -1)
            COVERED=$(grep -oP 'type="INSTRUCTION"[^/]*covered="\K[0-9]+' "$XML" | tail -1)
            if [ -n "$MISSED" ] && [ -n "$COVERED" ]; then
              TOTAL=$((MISSED + COVERED))
              PCT=$(awk "BEGIN { printf \"%.1f\", 100*$COVERED/$TOTAL }")
              echo "📊 Code Coverage: ${PCT}% ($COVERED/$TOTAL instructions)"
            else
              echo "⚠️ Could not parse coverage from XML"
            fi
          else
            echo "⚠️ Jacoco XML report not found"
          fi

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mud-frontend/package-lock.json

      - name: Install dependencies
        working-directory: mud-frontend
        run: npm ci

      - name: Lint
        working-directory: mud-frontend
        run: npm run lint

      - name: Test
        working-directory: mud-frontend
        run: npm test

      - name: Test Coverage
        working-directory: mud-frontend
        run: npm run test:coverage

      - name: Print Coverage
        if: always()
        working-directory: mud-frontend
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              console.log('📊 FE Coverage: ' +
                'Stmts ' + c.statements.pct + '% | ' +
                'Branch ' + c.branches.pct + '% | ' +
                'Funcs ' + c.functions.pct + '% | ' +
                'Lines ' + c.lines.pct + '%');
            "
          else
            echo '⚠️ Coverage report not found'
          fi

      - name: Build
        working-directory: mud-frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
        run: npm run build
