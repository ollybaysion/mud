spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  cache:
    type: none

admin:
  api-key: test-api-key

cors:
  allowed-origins: http://localhost:3000

analysis:
  concurrency: 2
  batch-size: 2

claude:
  api:
    key: test-key
    base-url: http://localhost:8888
    model: test-model
    max-tokens: 100
    deep-analysis-model: test-deep-model
    deep-analysis-max-tokens: 200

logging:
  level:
    com.mud: DEBUG
