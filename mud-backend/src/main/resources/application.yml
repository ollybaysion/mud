server:
  port: ${PORT:8080}

spring:
  application:
    name: mud-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/muddb}
    username: ${SPRING_DATASOURCE_USERNAME:mud}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      username: ${SPRING_DATA_REDIS_USERNAME:}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          min-idle: 2

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  cache:
    type: redis

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 100
      thread-name-prefix: mud-async-

admin:
  api-key: ${ADMIN_API_KEY:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://frontend:3000}

analysis:
  concurrency: ${ANALYSIS_CONCURRENCY:10}
  batch-size: ${ANALYSIS_BATCH_SIZE:5}

scoring:
  phase: ${SCORING_PHASE:2}

digest:
  from-email: ${DIGEST_FROM_EMAIL:noreply@mud.dev}
  base-url: ${DIGEST_BASE_URL:https://mud-production-5786.up.railway.app}

claude:
  api:
    key: ${CLAUDE_API_KEY}
    base-url: https://api.anthropic.com
    model: claude-haiku-4-5-20251001
    max-tokens: 2048
    deep-analysis-model: ${CLAUDE_DEEP_ANALYSIS_MODEL:claude-sonnet-4-6}
    deep-analysis-max-tokens: ${CLAUDE_DEEP_ANALYSIS_MAX_TOKENS:8192}

logging:
  level:
    com.mud: ${LOG_LEVEL:INFO}
    org.springframework.cache: DEBUG
    org.flywaydb: INFO
